<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Viewport ensures proper rendering on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Standard CRA metadata (you can adjust these) -->
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <!-- Favicon (optional) -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- PWA/manifest references (optional) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Page title -->
    <title>VIPSPOT Frontend</title>

    <!-- Content Security Policy:
         This example whitelists Google Tag Manager, Firebase domains, and self.
         Adjust or remove it entirely if you don't want a strict CSP. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://www.gstatic.com https://www.googletagmanager.com 'unsafe-inline';
        connect-src 'self' https://*.firebaseio.com https://firebaseinstallations.googleapis.com https://firebaseremoteconfig.googleapis.com https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://www.googleapis.com https://www.googletagmanager.com;
        img-src 'self' https://www.google-analytics.com data:;
        style-src 'self' 'unsafe-inline';
      "
    />
  </head>
  <body>
    <!-- Fallback message if JavaScript is disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- React will mount the entire app inside this 'root' div -->
    <div id="root"></div>
  </body>
</html>
