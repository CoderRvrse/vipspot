<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Viewport ensures proper rendering on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Standard CRA metadata (you can adjust these) -->
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <!-- If you have a favicon, reference it here -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- PWA/manifest references (optional) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- The page title that appears in the browser tab -->
    <title>React App</title>
  </head>
  <body>
    <!-- Fallback message if JavaScript is disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- React will mount the entire app inside this 'root' div -->
    <div id="root"></div>
  </body>
</html>
